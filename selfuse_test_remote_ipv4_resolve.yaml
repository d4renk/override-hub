FilterUS: &FilterUS '^(?=.*(美国|US|United States|America|🇺🇸))^(?!.*(网站|地址|剩余|过期|时间|有效|网址|禁止|邮箱|发布|客服|订阅|节点|落地|家宽|自建|×)).*$'
FilterUK: &FilterUK '^(?=.*(英国|UK|United Kingdom|🇬🇧))^(?!.*(网站|地址|剩余|过期|时间|有效|网址|禁止|邮箱|发布|客服|订阅|节点|落地|家宽|自建|×)).*$'
FilterFR: &FilterFR '^(?=.*(法国|FR|France|🇫🇷))^(?!.*(网站|地址|剩余|过期|时间|有效|网址|禁止|邮箱|发布|客服|订阅|节点|落地|家宽|自建|×)).*$'
FilterDE: &FilterDE '^(?=.*(德国|DE|Germany|🇩🇪))^(?!.*(网站|地址|剩余|过期|时间|有效|网址|禁止|邮箱|发布|客服|订阅|节点|落地|家宽|自建|×)).*$'
FilterTW: &FilterTW '^(?=.*(台湾|TW|Taiwan|Wan|🇨🇳|🇨🇳))^(?!.*(网站|地址|剩余|过期|时间|有效|网址|禁止|邮箱|发布|客服|订阅|节点|落地|家宽|自建|×)).*$'
FilterOthers: &FilterOthers '^(?!.*(🇭🇰|HK|Hong|香港|🇨🇳|TW|Taiwan|Wan|🇯🇵|JP|Japan|日本|🇸🇬|SG|Singapore|狮城|🇺🇸|US|United States|America|美国|🇩🇪|DE|Germany|德国|🇬🇧|UK|United Kingdom|英国|🇰🇷|KR|Korea|韩国|韓|🇫🇷|FR|France|法国)).*$'
FilterAdvance: &FilterAdvance '^(?=.*((?i)(\s|-)(([1-9](\.\d+)?)(×|x|X))|专线|专用|高级|急速|高倍率|IEPL|IPLC|AIA|CTM|CC|iepl|iplc|aia|ctm|cc))^(?!.*(落地|家宽|自建)).*$'
FilterLanding: &FilterLanding '^(?=.*((?i)落地|家宽|自建)).*$'
FilterLandingHK: &FilterLandingHK '^(?=.*((?i)落地|家宽|自建))(?=.*(香港|HK|Hong|🇭🇰)).*$'
FilterLandingJP: &FilterLandingJP '^(?=.*((?i)落地|家宽|自建))(?=.*(日本|JP|Japan|🇯🇵)).*$'
FilterLandingKR: &FilterLandingKR '^(?=.*((?i)落地|家宽|自建))(?=.*(韩国|韓|KR|Korea|🇰🇷)).*$'
FilterLandingSG: &FilterLandingSG '^(?=.*((?i)落地|家宽|自建))(?=.*(新加坡|狮城|SG|Singapore|🇸🇬)).*$'
FilterLandingUS: &FilterLandingUS '^(?=.*((?i)落地|家宽|自建))(?=.*(美国|US|United States|America|🇺🇸)).*$'
FilterLandingUK: &FilterLandingUK '^(?=.*((?i)落地|家宽|自建))(?=.*(英国|UK|United Kingdom|🇬🇧)).*$'
FilterLandingFR: &FilterLandingFR '^(?=.*((?i)落地|家宽|自建))(?=.*(法国|FR|France|🇫🇷)).*$'
FilterLandingDE: &FilterLandingDE '^(?=.*((?i)落地|家宽|自建))(?=.*(德国|DE|Germany|🇩🇪)).*$'
FilterLandingTW: &FilterLandingTW '^(?=.*((?i)落地|家宽|自建))(?=.*(台湾|TW|Taiwan|Wan|🇨🇳)).*$'
FilterAll: &FilterAll '^(?=.*(.))(?!.*((?i)群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|(\b(USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author)\b|(\d{4}-\d{2}-\d{2}|\d+G)))).*$'
FilterTunnel: &FilterTunnel '^(?=.*(香港|HK|Hong|🇭🇰|日本|JP|Japan|🇯🇵|新加坡|狮城|SG|Singapore|🇸🇬|韩国|KR|Korea|🇰🇷|美国|US|United States|America|🇺🇸))^(?!.*(网站|地址|剩余|过期|时间|有效|网址|禁止|邮箱|发布|客服|订阅|节点|落地|家宽|自建|×)).*$'

Select: &Select {type: select, url: 'http://connect.rom.miui.com/generate_204', disable-udp: false, hidden: false, include-all: true}
Auto: &Auto {type: url-test, url: 'http://connect.rom.miui.com/generate_204', interval: 10, tolerance: 50, disable-udp: false, hidden: true, include-all: true}
Loadbalance: &Loadbalance {type: load-balance, url: 'http://connect.rom.miui.com/generate_204', interval: 300, strategy: round-robin, disable-udp: false, hidden: true, include-all: true}
LandingLB: &LandingLB {type: url-test, url: 'http://connect.rom.miui.com/generate_204', interval: 10, tolerance: 50, disable-udp: false, hidden: true, include-all: true}
